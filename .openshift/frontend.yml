apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-search-qa-frontend
  labels:
    app: semantic-search-qa-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-search-qa-frontend
  template:
    metadata:
      labels:
        app: semantic-search-qa-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/yvvvan/semantic-search-qa/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4200
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 4200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-search-qa-frontend
  labels:
    app: semantic-search-qa-frontend
spec:
  selector:
    app: semantic-search-qa-frontend
  ports:
    - name: http
      port: 4200
      targetPort: 4200
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: semantic-search-qa-frontend
  labels:
    app: semantic-search-qa-frontend
spec:
  to:
    kind: Service
    name: semantic-search-qa-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
