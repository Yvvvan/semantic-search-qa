apiVersion: batch/v1
kind: Job
metadata:
  name: semantic-search-qa-index
  labels:
    app: semantic-search-qa-index
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: semantic-search-qa-index
    spec:
      restartPolicy: Never
      containers:
        - name: index
          image: ghcr.io/yvvvan/semantic-search-qa/index:latest
          imagePullPolicy: Always
          env:
            - name: ELASTIC_HOST
              value: semantic-search-qa-elastic
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
